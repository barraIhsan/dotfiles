[Effect-overview]
BorderActivate=9

[Effect-zoom]
EnableTextCaretTracking=true

[MouseBindings]
CommandAll2=Nothing

[NightColor]
Mode=Constant
NightTemperature=4100

[Plugins]
blurEnabled=true
contrastEnabled=true
desktopchangeosdEnabled=false
minimizeallEnabled=false
screenedgeEnabled=false
slidingnotificationsEnabled=true
videowallEnabled=false

[Script-videowall]
Whitelist=vlc, xv, vdpau, smplayer, dragon, xine, ffplay, mplayer, mpv

[TabBox]
HighlightWindows=false

[Wayland]
EnablePrimarySelection=false
InputMethod[$e]=/usr/share/applications/org.fcitx.Fcitx5.desktop
VirtualKeyboardEnabled=true

[Windows]
BorderlessMaximizedWindows=false

[Xwayland]
Scale=1.5
XwaylandEisNoPrompt=true

[org.kde.kdecoration2]
ButtonsOnLeft=MF
